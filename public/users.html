<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — ADM Saúde ERP</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="app-layout">
  <!-- SIDEBAR (same structure) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/index.html" class="sidebar-logo" title="ADM Saúde ERP">
        <img src="/assets/logo-adm-saude.png" alt="ADM Saúde">
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="/index.html" class="sidebar-item">
        <span class="icon">📋</span> Tarefas
      </a>
      <div class="sidebar-section-title">Sistema</div>
      <a href="/clients.html" class="sidebar-item">
        <span class="icon">💼</span> Clientes
      </a>
      <a href="/users.html" class="sidebar-item active">
        <span class="icon">👥</span> Usuários
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="userAvatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">—</div>
          <div class="sidebar-user-role" id="userRole">—</div>
        </div>
      </div>
      <button class="sidebar-logout" onclick="logout()">⎋ Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="app-header">
      <div class="header-left">
        <h1 class="header-title">Gerenciador de Usuários</h1>
      </div>
      <div class="header-right">
        <button class="btn btn-primary btn-sm" onclick="openUserModal()">＋ Novo Usuário</button>
      </div>
    </header>

    <div class="content-area">
      <div id="usersList"></div>
    </div>
  </main>
</div>

<!-- USER MODAL -->
<div class="modal-overlay" id="userModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h2 class="modal-title" id="userModalTitle">Novo Usuário</h2>
      <button class="modal-close" onclick="closeUserModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId">
      <div class="form-group">
        <label>Nome Completo *</label>
        <input type="text" class="form-input" id="editUserName" placeholder="Ex: Paulo Silva">
      </div>
      <div class="form-group">
        <label>Usuário (login) *</label>
        <input type="text" class="form-input" id="editUserUsername" placeholder="Ex: paulo">
      </div>
      <div class="form-group">
        <label id="passwordLabel">Senha *</label>
        <input type="password" class="form-input" id="editUserPassword" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Papel</label>
        <select class="form-input" id="editUserRole">
          <option value="user">Usuário</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeUserModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUser()">Salvar</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmModal">
  <div class="confirm-box">
    <h3 class="confirm-title" id="confirmTitle">Confirmar Ação</h3>
    <p class="confirm-message" id="confirmMessage">Você tem certeza que deseja realizar esta operação?</p>
    <div class="confirm-buttons">
      <button class="btn btn-secondary btn-sm" id="confirmCancelBtn">Cancelar</button>
      <button class="btn btn-danger btn-sm" id="confirmOkBtn">Confirmar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/users.js"></script>
</body>
</html>
